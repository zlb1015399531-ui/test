<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对对碰 · 奖池测算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f9f9f8; --surface:#fff; --surface-2:#f4f4f2; --surface-3:#ececea;
  --border:rgba(0,0,0,0.09); --border-strong:rgba(0,0,0,0.15);
  --text-1:#1a1a18; --text-2:#4a4a46; --text-3:#8a8a84; --text-4:#b0b0aa;
  --green:#16a34a; --green-bg:#f0fdf4;
  --red:#dc2626; --red-bg:#fef2f2;
  --amber:#b45309; --amber-bg:#fffbeb;
  --radius:8px; --radius-sm:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased;}

nav{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50;}
.nav-brand{font-family:'Instrument Serif',serif;font-size:17px;letter-spacing:-0.01em;}
.nav-sep{width:1px;height:16px;background:var(--border-strong);}
.nav-sub{font-size:12px;color:var(--text-3);font-family:'Geist Mono',monospace;}

.page{max-width:860px;margin:0 auto;padding:32px 24px 80px;}

.sec-label{font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px;overflow:hidden;}

/* formula bar */
.formula-bar{background:var(--text-1);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;flex-wrap:wrap;}
.f-item{flex:1;min-width:200px;padding:4px 12px;border-right:1px solid rgba(255,255,255,.08);}
.f-item:first-child{padding-left:0;}.f-item:last-child{border-right:none;}
.f-label{font-size:10px;font-family:'Geist Mono',monospace;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.f-expr{font-size:11px;color:rgba(255,255,255,.5);font-family:'Geist Mono',monospace;margin-bottom:3px;}
.f-val{font-size:16px;font-weight:500;color:#fff;font-family:'Geist Mono',monospace;}
.f-val.good{color:#4ade80;}.f-val.warn{color:#fbbf24;}.f-val.bad{color:#f87171;}

/* config row */
.config-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);}
.config-cell{background:var(--surface);padding:16px 20px;}
.cell-label{font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
.cell-input{display:flex;align-items:center;gap:4px;}
.cell-prefix{font-size:13px;color:var(--text-3);font-family:'Geist Mono',monospace;flex-shrink:0;}
input[type=number]{background:none;border:none;outline:none;font-size:20px;font-weight:500;color:var(--text-1);font-family:'Geist Mono',monospace;width:100%;appearance:none;}
input[type=number]:disabled{color:var(--text-3);font-size:16px;}
.slider-wrap{display:flex;align-items:center;gap:10px;margin-top:2px;}
input[type=range]{flex:1;height:3px;appearance:none;background:var(--surface-3);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;background:var(--text-1);border-radius:50%;cursor:pointer;}
.slider-val{font-size:20px;font-weight:500;font-family:'Geist Mono',monospace;color:var(--text-1);min-width:44px;text-align:right;}

/* prize grid */
.prize-grid{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:12px;}
.prize-row{background:var(--surface);display:grid;grid-template-columns:24px 52px 1fr 90px 90px 90px minmax(120px,1fr) 32px;align-items:stretch;}
.prize-row:hover{background:#fafaf9;}
.prize-header{background:var(--surface-2);font-size:10px;font-family:'Geist Mono',monospace;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;align-items:center;}
.prize-header:hover{background:var(--surface-2);}
.pc{padding:10px 12px;border-right:1px solid var(--border);display:flex;align-items:center;}
.pc:last-child{border-right:none;}
.pc-dot{padding:0 0 0 8px;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.p-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* image cell */
.pc-img{border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:6px;position:relative;}
.img-thumb{width:38px;height:38px;border-radius:4px;object-fit:cover;cursor:pointer;display:block;transition:opacity .15s;}
.img-thumb:hover{opacity:.8;}
.img-placeholder{width:38px;height:38px;border-radius:4px;border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-4);transition:all .15s;}
.img-placeholder:hover{border-color:var(--text-3);color:var(--text-3);background:var(--surface-2);}
.img-loading{width:38px;height:38px;border-radius:4px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-4);}
@keyframes spin{to{transform:rotate(360deg);}}.spin{animation:spin .8s linear infinite;}

.p-name{border:none;background:none;outline:none;font-size:13px;color:var(--text-1);font-family:'Noto Sans SC',sans-serif;width:100%;padding:0;}
.p-name::placeholder{color:var(--text-4);}
.p-field{border:none;background:none;outline:none;font-size:13px;font-family:'Geist Mono',monospace;color:var(--text-1);width:100%;padding:0;appearance:none;cursor:pointer;}
.pc-stat{flex-direction:column;align-items:flex-start;gap:2px;}
.p-stat{font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);white-space:nowrap;}
.p-stat.hi{color:var(--text-1);font-weight:500;}.p-stat.danger{color:var(--red);}
.pc-del{border-right:none;padding:0;justify-content:center;}
.p-del{background:none;border:none;cursor:pointer;color:var(--text-4);font-size:16px;line-height:1;width:100%;height:100%;transition:color .1s;}
.p-del:hover{color:var(--red);}

.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:none;border:1px dashed var(--border-strong);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:'Geist Mono',monospace;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase;transition:all .15s;margin-bottom:20px;}
.add-btn:hover{border-color:var(--text-2);color:var(--text-2);background:var(--surface-2);}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:6px;object-fit:contain;box-shadow:0 24px 80px rgba(0,0,0,.5);cursor:default;}
.lb-name{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,.6);font-family:'Geist Mono',monospace;background:rgba(0,0,0,.4);padding:6px 14px;border-radius:20px;white-space:nowrap;}
.lb-close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.1);border:none;cursor:pointer;color:rgba(255,255,255,.7);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s;}
.lb-close:hover{background:rgba(255,255,255,.2);}

/* rec */
.rec-controls{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.strat-btn{padding:5px 12px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:12px;font-family:'Geist Mono',monospace;color:var(--text-2);transition:all .12s;}
.strat-btn:hover{border-color:var(--text-2);background:var(--surface-2);}
.strat-btn.active{background:var(--text-1);border-color:var(--text-1);color:#fff;}
.gen-btn{margin-left:auto;padding:6px 16px;background:var(--text-1);border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:'Geist Mono',monospace;color:#fff;letter-spacing:.04em;display:flex;align-items:center;gap:6px;transition:opacity .12s;}
.gen-btn:hover{opacity:.8;}.gen-btn:disabled{opacity:.35;cursor:not-allowed;}
.strat-hint{font-size:11px;color:var(--text-3);margin-bottom:12px;}
.rec-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.rec-head{padding:9px 14px;background:var(--surface-2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);}
.rec-row{display:grid;grid-template-columns:8px 1fr 90px 70px 100px 60px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.rec-row:last-child{border-bottom:none;}
.rec-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-1);}
.rec-mono{font-family:'Geist Mono',monospace;font-size:12px;color:var(--text-2);white-space:nowrap;}
.rec-diff{font-family:'Geist Mono',monospace;font-size:10px;white-space:nowrap;}
.apply-btn{padding:3px 9px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:10px;font-family:'Geist Mono',monospace;color:var(--text-2);transition:all .1s;white-space:nowrap;}
.apply-btn:hover{background:var(--text-1);color:#fff;border-color:var(--text-1);}
.apply-all-btn{padding:4px 12px;background:var(--text-1);border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:10px;font-family:'Geist Mono',monospace;color:#fff;transition:opacity .1s;}
.apply-all-btn:hover{opacity:.75;}

/* metrics */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:12px;}
.metric{background:var(--surface);padding:14px 16px;}
.metric-label{font-size:10px;font-family:'Geist Mono',monospace;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.metric-val{font-size:20px;font-weight:500;font-family:'Geist Mono',monospace;color:var(--text-1);line-height:1.1;}
.metric-val.good{color:var(--green);}.metric-val.bad{color:var(--red);}.metric-val.warn{color:var(--amber);}
.metric-sub{font-size:10px;color:var(--text-4);margin-top:2px;}

/* progress */
.progress-meta{display:flex;justify-content:space-between;font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);margin-bottom:5px;}
.progress-track{height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;border-radius:2px;transition:width .3s;}

/* prob bar */
.prob-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:8px;background:var(--surface-3);}
.prob-legend{display:flex;flex-wrap:wrap;gap:12px;}
.prob-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);}
.prob-legend-dot{width:7px;height:7px;border-radius:1.5px;flex-shrink:0;}

/* status */
.status{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;line-height:1.65;border:1px solid;margin-bottom:16px;}
.status.ok{background:var(--green-bg);border-color:rgba(22,163,74,.2);color:var(--green);}
.status.warn{background:var(--amber-bg);border-color:rgba(180,83,9,.2);color:var(--amber);}
.status.bad{background:var(--red-bg);border-color:rgba(220,38,38,.2);color:var(--red);}

/* table */
.detail-wrap{overflow-x:auto;}
.detail-table{width:100%;border-collapse:collapse;font-size:12px;}
.detail-table th{padding:8px 12px;font-size:10px;font-family:'Geist Mono',monospace;font-weight:500;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;background:var(--surface-2);border-bottom:1px solid var(--border-strong);white-space:nowrap;text-align:left;}
.detail-table th.r{text-align:right;}
.detail-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-1);vertical-align:middle;}
.detail-table td.mono{font-family:'Geist Mono',monospace;font-size:12px;}
.detail-table td.r{text-align:right;}
.detail-table tr.total td{font-weight:500;background:var(--surface-2);font-family:'Geist Mono',monospace;border-top:1px solid var(--border-strong);border-bottom:none;}
.detail-table tr:last-child:not(.total) td{border-bottom:none;}
.dot-name{display:flex;align-items:center;gap:7px;}
.tbl-dot{width:7px;height:7px;border-radius:1.5px;flex-shrink:0;}
</style>
</head>
<body>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-name" id="lb-name"></div>
</div>

<nav>
  <span class="nav-brand">对对碰</span>
  <div class="nav-sep"></div>
  <span class="nav-sub">奖池测算 · Prize Pool Calculator</span>
</nav>

<div class="page">

  <div class="sec-label">定价 & 目标利润率</div>

  <div class="formula-bar">
    <div class="f-item"><div class="f-label">预算上限</div><div class="f-expr">定价 × (1 − 利润率)</div><div class="f-val" id="f-budget">—</div></div>
    <div class="f-item"><div class="f-label">当前期望成本</div><div class="f-expr">Σ 区间概率 × 成本价</div><div class="f-val" id="f-cost">—</div></div>
    <div class="f-item"><div class="f-label">实际利润率</div><div class="f-expr">(定价 − 期望成本) ÷ 定价</div><div class="f-val" id="f-margin">—</div></div>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <div class="config-row">
      <div class="config-cell">
        <div class="cell-label">单局定价</div>
        <div class="cell-input"><span class="cell-prefix">¥</span><input type="number" id="unit-price" min="1" step="1" value="98"></div>
      </div>
      <div class="config-cell">
        <div class="cell-label">目标利润率</div>
        <div class="slider-wrap">
          <input type="range" min="0" max="99" step="1" value="12" id="sl-margin">
          <span class="slider-val" id="v-margin">12%</span>
        </div>
      </div>
      <div class="config-cell">
        <div class="cell-label">奖品预算上限</div>
        <div class="cell-input"><span class="cell-prefix">¥</span><input type="number" id="budget-display" disabled></div>
      </div>
    </div>
  </div>

  <div class="sec-label">奖品配置</div>

  <div class="prize-grid" id="prize-grid">
    <div class="prize-row prize-header">
      <div class="pc-dot"></div>
      <div class="pc" style="font-size:10px;">图片</div>
      <div class="pc">商品名称</div>
      <div class="pc">门槛（福蛋）</div>
      <div class="pc">成本价 ¥</div>
      <div class="pc">零售价 ¥</div>
      <div class="pc">概率 / 期望成本</div>
      <div class="pc" style="border-right:none;"></div>
    </div>
  </div>

  <button class="add-btn" id="add-btn">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    添加奖品
  </button>

  <div class="sec-label">智能推荐门槛</div>

  <div class="card" style="margin-bottom:20px;">
    <div style="padding:16px 18px;">
      <div class="rec-controls">
        <button class="strat-btn active" data-strat="equal_cost">均等预算</button>
        <button class="strat-btn" data-strat="front_heavy">前档倾斜</button>
        <button class="strat-btn" data-strat="back_heavy">后档倾斜</button>
        <button class="gen-btn" id="rec-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6h10M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          生成推荐
        </button>
      </div>
      <div class="strat-hint" id="strat-hint">每档分配等额预算，各档期望成本均等</div>
      <div id="rec-output"></div>
    </div>
  </div>

  <div class="sec-label">汇总指标</div>
  <div class="metrics-row" id="metrics-row"></div>

  <div class="progress-meta"><span>预算使用进度</span><span id="prog-label" style="font-family:'Geist Mono',monospace;font-size:11px;"></span></div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%;background:var(--green);"></div></div>

  <div style="font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-3);margin-bottom:6px;">概率区间分布</div>
  <div class="prob-bar" id="prob-bar"></div>
  <div class="prob-legend" id="prob-legend"></div>
  <div style="font-size:10px;color:var(--text-4);font-family:'Geist Mono',monospace;margin-top:4px;margin-bottom:16px;" id="uncov-note"></div>

  <div id="status-wrap"></div>

  <div class="sec-label">奖品明细</div>
  <div class="card">
    <div class="detail-wrap">
      <table class="detail-table">
        <thead><tr>
          <th>商品</th><th>门槛区间</th>
          <th class="r">区间概率</th><th class="r">成本价</th>
          <th class="r">零售价</th><th class="r">期望成本/局</th>
          <th class="r">期望零售/局</th><th class="r">占预算</th>
        </tr></thead>
        <tbody id="detail-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
'use strict';

// ── 概率数据 ──
const PD=[
  [12,0.1335],[13,0.8935],[14,3.8773],[15,8.1009],[16,10.5503],[17,9.8411],
  [18,8.7741],[19,9.6186],[20,10.1563],[21,8.2883],[22,5.8461],[23,4.8695],
  [24,4.5854],[25,3.5663],[26,2.3319],[27,1.7714],[28,1.6042],[29,1.2473],
  [30,0.8484],[31,0.6455],[32,0.5374],[33,0.4223],[34,0.3213],[35,0.2445],
  [36,0.1934],[37,0.1590],[38,0.1230],[39,0.0918],[40,0.0734],[41,0.0580],
  [42,0.0498],[43,0.0351],[44,0.0293],[45,0.0259],[46,0.0170],[47,0.0138],
  [48,0.0131],[49,0.0085],[50,0.0070],[51,0.0058],[52,0.0045],[53,0.0033],
  [54,0.0022],[55,0.0016],[56,0.0022],[57,0.0010],[58,0.0009],[59,0.0009],
  [60,0.0009],[61,0.0005],[62,0.0005],[63,0.0007],[64,0.0007],[65,0.0002],
  [67,0.0001],[68,0.0001],[69,0.0001],[71,0.0001],[72,0.0001],[77,0.0001],
];
const EGGS=PD.map(r=>r[0]);
const N=EGGS.length;
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];
const CUM=new Array(N+1).fill(0);
for(let k=0;k<N;k++) CUM[k+1]=CUM[k]+PD[k][1];
function sf(i,j){return CUM[Math.min(j,N)]-CUM[i];}
function segP(lo,hi){return PD.filter(r=>r[0]>=lo&&(hi===9999||r[0]<hi)).reduce((s,r)=>s+r[1],0);}

// ── 状态 ──
let prizes=[
  {id:1,name:'DIMOO 收纳包盲盒',thresh:12,cost:71.1,retail:79,img:null},
  {id:2,name:'DIMOO 耳机包盲盒',thresh:20,cost:84,retail:99,img:null},
  {id:3,name:'DIMOO 搪胶毛绒挂件',thresh:29,cost:129,retail:145.5,img:null},
  {id:4,name:'DIMOO 米奇搪胶毛绒包',thresh:36,cost:539,retail:599,img:null},
];
let nid=5, strat='equal_cost', lastRec=[];

// ── localStorage ──
const SK='ddb_v4';
function save(){
  try{ localStorage.setItem(SK,JSON.stringify({
    up:document.getElementById('unit-price').value,
    mp:document.getElementById('sl-margin').value,
    prizes, nid
  }));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SK)||'null');
    if(!d) return;
    if(d.up) document.getElementById('unit-price').value=d.up;
    if(d.mp){document.getElementById('sl-margin').value=d.mp;document.getElementById('v-margin').textContent=d.mp+'%';}
    if(d.prizes&&d.prizes.length){prizes=d.prizes;nid=d.nid||prizes.reduce((m,p)=>Math.max(m,p.id),0)+1;}
  }catch(e){}
}

// ── 算法 ──
function combs(max,r){
  const res=[];
  (function h(s,c){
    if(c.length===r){res.push([...c]);return;}
    const rem=r-c.length;
    for(let i=s;i<=max-rem+1;i++){c.push(i);h(i+1,c);c.pop();}
  })(1,[]);
  return res;
}
function optimize(costs,budget,s){
  const n=costs.length;
  let te;
  if(s==='equal_cost') te=costs.map(()=>budget/n);
  else if(s==='front_heavy'){const w=costs.map((_,i)=>n-i),tw=w.reduce((a,b)=>a+b,0);te=w.map(ww=>budget*ww/tw);}
  else{const w=costs.map((_,i)=>i+1),tw=w.reduce((a,b)=>a+b,0);te=w.map(ww=>budget*ww/tw);}
  if(n===1) return{bounds:[0,N],total:sf(0,N)/100*costs[0],te};
  let best=1e18,bb=null,bt=0;
  for(const sp of combs(N-1,n-1)){
    const b=[0,...sp,N];
    let t=0,sd=0;
    for(let i=0;i<n;i++){const e=sf(b[i],b[i+1])/100*costs[i];t+=e;sd+=Math.abs(e-te[i]);}
    const sc=Math.abs(t-budget)*10+sd*0.3;
    if(sc<best){best=sc;bb=b;bt=t;}
  }
  return{bounds:bb,total:bt,te};
}
function minEc(costs){
  const n=costs.length;
  if(n===1) return sf(0,N)/100*costs[0];
  let min=1e18;
  for(const sp of combs(N-1,n-1)){
    const b=[0,...sp,N];
    const t=costs.reduce((s,c,i)=>s+sf(b[i],b[i+1])/100*c,0);
    if(t<min) min=t;
  }
  return min;
}
function getSegs(){
  const sorted=[...prizes].sort((a,b)=>a.thresh-b.thresh);
  return sorted.map((p,i)=>({...p,
    next:i+1<sorted.length?sorted[i+1].thresh:9999,
    prob:segP(p.thresh,i+1<sorted.length?sorted[i+1].thresh:9999)
  }));
}

// ── 渲染奖品列表 ──
function renderPrizes(){
  const segs=getSegs();
  const sm={};segs.forEach(s=>sm[s.id]={prob:s.prob,next:s.next});
  const up=+(document.getElementById('unit-price').value)||1;
  const mp=+(document.getElementById('sl-margin').value)||0;
  const budget=up*(1-mp/100);
  const sorted=[...prizes].sort((a,b)=>a.thresh-b.thresh);
  const grid=document.getElementById('prize-grid');
  // remove all rows except header
  while(grid.children.length>1) grid.removeChild(grid.lastChild);

  prizes.forEach(p=>{
    const seg=sm[p.id]||{prob:0,next:9999};
    const ec=seg.prob/100*p.cost;
    const pct=budget>0?ec/budget*100:0;
    const ci=sorted.findIndex(s=>s.id===p.id);
    const color=COLORS[ci%COLORS.length];
    const range=seg.next===9999?`${p.thresh}+`:`${p.thresh}～${seg.next-1}`;

    const row=document.createElement('div');
    row.className='prize-row';
    row.dataset.id=p.id;

    // dot
    const dc=document.createElement('div');dc.className='pc-dot';
    const dot=document.createElement('span');dot.className='p-dot';dot.style.background=color;
    dc.appendChild(dot);row.appendChild(dc);

    // image
    const ic=document.createElement('div');ic.className='pc-img';ic.dataset.imgcol=p.id;
    const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
    fi.style.display='none';fi.dataset.uploadId=p.id;ic.appendChild(fi);
    if(p.img){
      const img=document.createElement('img');img.className='img-thumb';
      img.src=p.img;img.alt=p.name;img.dataset.lightboxId=p.id;
      ic.appendChild(img);
    } else {
      const ph=document.createElement('div');ph.className='img-placeholder';ph.dataset.uploadTrigger=p.id;
      ph.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
      ic.appendChild(ph);
    }
    row.appendChild(ic);

    // name
    const nc=document.createElement('div');nc.className='pc';
    const ni=document.createElement('input');ni.className='p-name';ni.value=p.name;
    ni.placeholder='商品名称';ni.dataset.id=p.id;ni.dataset.field='name';
    nc.appendChild(ni);row.appendChild(nc);

    // thresh
    const tc=document.createElement('div');tc.className='pc';
    const ts=document.createElement('select');ts.className='p-field';ts.dataset.id=p.id;ts.dataset.field='thresh';
    EGGS.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e+' 个';if(e===p.thresh)o.selected=true;ts.appendChild(o);});
    tc.appendChild(ts);row.appendChild(tc);

    // cost
    const cc=document.createElement('div');cc.className='pc';
    const ci2=document.createElement('input');ci2.type='number';ci2.className='p-field';ci2.min='0';ci2.step='0.1';ci2.value=p.cost;ci2.dataset.id=p.id;ci2.dataset.field='cost';
    cc.appendChild(ci2);row.appendChild(cc);

    // retail
    const rc=document.createElement('div');rc.className='pc';
    const ri=document.createElement('input');ri.type='number';ri.className='p-field';ri.min='0';ri.step='0.1';ri.value=p.retail;ri.dataset.id=p.id;ri.dataset.field='retail';
    rc.appendChild(ri);row.appendChild(rc);

    // stats + delete
    // stat cell
    const sc2=document.createElement('div');sc2.className='pc pc-stat';
    sc2.innerHTML=`<span class="p-stat hi">${seg.prob.toFixed(4)}% <span style="font-weight:400;color:var(--text-3);">${range}个</span></span><span class="p-stat ${pct>80?'danger':''}">¥${ec.toFixed(2)} · ${pct.toFixed(0)}%预算</span>`;
    row.appendChild(sc2);

    // delete cell (separate column)
    const dc2=document.createElement('div');dc2.className='pc';dc2.style.cssText='border-right:none;padding:0;justify-content:center;';
    const db=document.createElement('button');db.dataset.del=p.id;db.textContent='×';
    db.style.cssText='background:none;border:none;cursor:pointer;color:var(--text-4);font-size:18px;line-height:1;width:100%;height:100%;min-height:44px;transition:color .1s;';
    db.addEventListener('mouseover',()=>db.style.color='var(--red)');
    db.addEventListener('mouseout',()=>db.style.color='var(--text-4)');
    dc2.appendChild(db);row.appendChild(dc2);

    grid.appendChild(row);
  });
}

// ── calc ──
function calc(){
  const up=+(document.getElementById('unit-price').value)||1;
  const mp=+(document.getElementById('sl-margin').value)||0;
  const budget=up*(1-mp/100);
  document.getElementById('budget-display').value=budget.toFixed(2);

  const segs=getSegs();
  let tec=0,ter=0,tprob=0;
  const rows=segs.map((s,i)=>{
    const ec=s.prob/100*s.cost,er=s.prob/100*s.retail;
    tec+=ec;ter+=er;tprob+=s.prob;
    return{...s,ec,er,color:COLORS[i%COLORS.length]};
  });
  const uncov=100-tprob,used=budget>0?tec/budget*100:0,rem=budget-tec;
  const actM=up>0?(1-tec/up)*100:0,retailR=up>0?ter/up*100:0;

  // formula
  document.getElementById('f-budget').textContent=`¥${budget.toFixed(2)}`;
  document.getElementById('f-cost').textContent=`¥${tec.toFixed(2)}`;
  const fm=document.getElementById('f-margin');
  fm.textContent=`${actM.toFixed(2)}%`;
  fm.className='f-val '+(actM<mp-1?'bad':actM>mp+1?'good':'warn');

  renderPrizes();

  // metrics
  document.getElementById('metrics-row').innerHTML=`
    <div class="metric"><div class="metric-label">单局定价</div><div class="metric-val">¥${up}</div><div class="metric-sub">玩家每局花费</div></div>
    <div class="metric"><div class="metric-label">奖品预算</div><div class="metric-val">¥${budget.toFixed(2)}</div><div class="metric-sub">定价×(1−利润率)</div></div>
    <div class="metric"><div class="metric-label">期望奖品成本</div><div class="metric-val ${tec>budget?'bad':''}">¥${tec.toFixed(2)}</div><div class="metric-sub">${tec>budget?'超出预算':'在预算内'}</div></div>
    <div class="metric"><div class="metric-label">剩余预算</div><div class="metric-val ${rem<0?'bad':rem<budget*.05?'warn':'good'}">${rem>=0?'+':''}¥${Math.abs(rem).toFixed(2)}</div><div class="metric-sub">${rem<0?'超出':'剩余'}</div></div>
    <div class="metric"><div class="metric-label">实际利润率</div><div class="metric-val ${actM<mp-1?'bad':actM>mp+1?'good':''}">${actM.toFixed(2)}%</div><div class="metric-sub">目标 ${mp}%</div></div>
    <div class="metric"><div class="metric-label">零售价值率</div><div class="metric-val">${retailR.toFixed(1)}%</div><div class="metric-sub">玩家感知÷定价</div></div>
    <div class="metric"><div class="metric-label">毛利润/局</div><div class="metric-val ${rem>=0?'good':'bad'}">${rem>=0?'+':''}¥${(up-tec).toFixed(2)}</div></div>
    <div class="metric"><div class="metric-label">概率覆盖率</div><div class="metric-val ${uncov>5?'warn':''}">${tprob.toFixed(2)}%</div><div class="metric-sub">未覆盖 ${uncov.toFixed(2)}%</div></div>`;

  // progress
  const bc=used>100?'var(--red)':used>90?'var(--amber)':'var(--green)';
  document.getElementById('prog-fill').style.cssText=`width:${Math.min(used,100)}%;background:${bc};`;
  document.getElementById('prog-label').textContent=`¥${tec.toFixed(2)} / ¥${budget.toFixed(2)} · ${used.toFixed(1)}%`;

  // prob bar
  const pb=document.getElementById('prob-bar'),pl=document.getElementById('prob-legend');
  pb.innerHTML='';pl.innerHTML='';
  rows.forEach(r=>{
    const d=document.createElement('div');d.style.cssText=`flex:${Math.max(r.prob,.05)};background:${r.color};`;pb.appendChild(d);
    const l=document.createElement('div');l.className='prob-legend-item';
    l.innerHTML=`<span class="prob-legend-dot" style="background:${r.color}"></span>${r.name.slice(0,8)} <strong>${r.prob.toFixed(2)}%</strong>`;
    pl.appendChild(l);
  });
  if(uncov>0.001){
    const d=document.createElement('div');d.style.cssText=`flex:${uncov};background:var(--surface-3);`;pb.appendChild(d);
    document.getElementById('uncov-note').textContent=`灰色区域 (${uncov.toFixed(2)}%) 无奖品覆盖`;
  } else document.getElementById('uncov-note').textContent='';

  // status
  const sw=document.getElementById('status-wrap');
  if(tec>budget) sw.innerHTML=`<div class="status bad">超出预算 ¥${(tec-budget).toFixed(2)}，实际利润率 ${actM.toFixed(1)}%，低于目标 ${mp}%</div>`;
  else if(rem<budget*.03) sw.innerHTML=`<div class="status warn">预算基本用完，实际利润率 ${actM.toFixed(2)}%</div>`;
  else sw.innerHTML=`<div class="status ok">预算剩余 ¥${rem.toFixed(2)}，实际利润率 ${actM.toFixed(2)}%，高于目标 ${mp}%</div>`;

  // detail table
  document.getElementById('detail-tbody').innerHTML=rows.map(r=>{
    const pB=budget>0?r.ec/budget*100:0;
    const range=r.next===9999?`${r.thresh}个+`:`${r.thresh}～${r.next-1}个`;
    return`<tr><td><div class="dot-name"><span class="tbl-dot" style="background:${r.color}"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;display:inline-block;" title="${r.name}">${r.name}</span></div></td>
    <td class="mono">${range}</td><td class="r mono">${r.prob.toFixed(4)}%</td>
    <td class="r mono">¥${r.cost.toFixed(1)}</td><td class="r mono">¥${r.retail.toFixed(1)}</td>
    <td class="r mono" style="font-weight:500;">¥${r.ec.toFixed(2)}</td><td class="r mono">¥${r.er.toFixed(2)}</td>
    <td class="r mono" style="color:${pB>80?'var(--red)':pB>50?'var(--amber)':'var(--text-3)'};">${pB.toFixed(1)}%</td></tr>`;
  }).join('')+`<tr class="total"><td>合计</td><td></td><td class="r">${tprob.toFixed(4)}%</td><td class="r" colspan="2"></td>
    <td class="r">¥${tec.toFixed(2)}</td><td class="r">¥${ter.toFixed(2)}</td>
    <td class="r" style="color:${used>100?'var(--red)':'var(--text-1)'};">${used.toFixed(1)}%</td></tr>`;

  save();
}

function calcNameOnly(){
  // only refresh detail table name column without re-rendering prizes
  const segs=getSegs();
  const trs=document.getElementById('detail-tbody').querySelectorAll('tr:not(.total)');
  segs.forEach((s,i)=>{
    if(trs[i]){const sp=trs[i].querySelector('span[title]');if(sp){sp.title=s.name;sp.textContent=s.name;}}
  });
  save();
}

// ── prize actions ──
function addPrize(){
  prizes.push({id:nid++,name:'新奖品',thresh:20,cost:100,retail:199,img:null});
  calc();
}
function delPrize(id){
  prizes=prizes.filter(p=>p.id!==id);calc();
}
function updatePrize(id,field,val){
  const p=prizes.find(p=>p.id===id);
  if(p) p[field]=val;
}

// ── recommend ──
function setStrat(s,el){
  strat=s;
  document.querySelectorAll('.strat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const h={equal_cost:'每档分配等额预算，各档期望成本均等',front_heavy:'低门槛奖品分配更多预算，获奖感更频繁',back_heavy:'高门槛奖品分配更多预算，大奖更有分量'};
  document.getElementById('strat-hint').textContent=h[s];
}

function runRecommend(){
  const btn=document.getElementById('rec-btn');
  btn.disabled=true;btn.textContent='计算中...';
  setTimeout(()=>{
    const up=+(document.getElementById('unit-price').value)||1;
    const mp=+(document.getElementById('sl-margin').value)||0;
    const budget=up*(1-mp/100);
    if(!prizes.length){document.getElementById('rec-output').innerHTML='<div class="status warn">请先添加奖品</div>';resetBtn();return;}

    const byCost=[...prizes].sort((a,b)=>a.cost-b.cost);
    const costs=byCost.map(p=>p.cost);
    const {bounds,total:bt,te}=optimize(costs,budget,strat);
    const actM=(up-bt)/up*100, diff=Math.abs(actM-mp);

    let sh='';
    if(bt>budget+0.5){
      const me=minEc(costs);
      sh=`<div class="status bad" style="margin-bottom:10px;"><strong>目标利润率 ${mp}% 无法达到</strong> — 最小期望成本 ¥${me.toFixed(2)}，最高利润率约 ${((1-me/up)*100).toFixed(1)}%。以下为最接近方案（实际 ${actM.toFixed(1)}%）：</div>`;
    } else if(diff<1){
      sh=`<div class="status ok" style="margin-bottom:10px;">精确命中 — 实际利润率 <strong>${actM.toFixed(2)}%</strong>，目标 ${mp}%</div>`;
    } else {
      sh=`<div class="status warn" style="margin-bottom:10px;">接近目标 — 实际 <strong>${actM.toFixed(1)}%</strong> vs 目标 ${mp}%，误差 ${diff.toFixed(1)}%（概率分布离散所致）</div>`;
    }

    lastRec=byCost.map((p,i)=>{
      const li=bounds[i],hi=bounds[i+1];
      const lo=EGGS[li],he=hi>=N?9999:EGGS[hi];
      const sp=sf(li,hi),ec=sp/100*p.cost;
      return{id:p.id,name:p.name,lo,he,hiStr:he===9999?'+':he-1,sp,ec,te:te[i],d:ec-te[i]};
    });

    const rows=lastRec.map((r,i)=>{
      const c=COLORS[i%COLORS.length];
      const ds=(r.d>=0?'+':'')+'¥'+Math.abs(r.d).toFixed(2);
      const dc=Math.abs(r.d)<Math.max(r.te*.1,.5)?'var(--green)':'var(--amber)';
      return`<div class="rec-row">
        <span style="width:7px;height:7px;border-radius:1.5px;background:${c};display:inline-block;flex-shrink:0;"></span>
        <span class="rec-name" title="${r.name}">${r.name}</span>
        <span class="rec-mono">${r.lo}～${r.hiStr}个</span>
        <span class="rec-mono">${r.sp.toFixed(2)}%</span>
        <span class="rec-mono">¥${r.ec.toFixed(2)} <span class="rec-diff" style="color:${dc}">${ds}</span></span>
        <button class="apply-btn" data-apply="${r.id}" data-egg="${r.lo}">应用</button>
      </div>`;
    }).join('');

    document.getElementById('rec-output').innerHTML=`${sh}<div class="rec-card">
      <div class="rec-head">
        <span>推荐总期望成本 <strong style="color:var(--text-1);font-family:'Geist Mono',monospace;">¥${bt.toFixed(2)}</strong> / 预算 ¥${budget.toFixed(2)}</span>
        <button class="apply-all-btn" id="apply-all-btn">全部应用</button>
      </div>${rows}</div>`;

    // re-bind apply-all (freshly created element)
    document.getElementById('apply-all-btn').addEventListener('click', applyAll);
    resetBtn();
  },30);
}
function resetBtn(){
  const b=document.getElementById('rec-btn');b.disabled=false;
  b.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6h10M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>生成推荐';
}
function applySingle(id,lo){ const p=prizes.find(p=>p.id===id);if(p){p.thresh=lo;calc();} }
function applyAll(){ if(!lastRec.length) return; lastRec.forEach(r=>{ const p=prizes.find(p=>p.id===r.id);if(p) p.thresh=r.lo; }); calc(); setTimeout(runRecommend,60); }

// ── lightbox ──
function openLightbox(src,name){
  document.getElementById('lb-img').src=src;
  document.getElementById('lb-name').textContent=name;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

// ── image upload (local base64) ──
function handleUpload(id,file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const p=prizes.find(p=>p.id===id);
    if(p){ p.img=e.target.result; save(); renderPrizes(); }
  };
  reader.readAsDataURL(file);
}

// ── 所有事件绑定集中在这里 ──
document.addEventListener('DOMContentLoaded', function(){

  // 定价 & 利润率
  document.getElementById('unit-price').addEventListener('input', calc);
  document.getElementById('sl-margin').addEventListener('input', function(){
    document.getElementById('v-margin').textContent=this.value+'%';
    calc();
  });

  // 添加奖品
  document.getElementById('add-btn').addEventListener('click', addPrize);

  // 推荐按钮
  document.getElementById('rec-btn').addEventListener('click', runRecommend);

  // 策略按钮
  document.querySelectorAll('.strat-btn').forEach(btn=>{
    btn.addEventListener('click', function(){ setStrat(this.dataset.strat, this); });
  });

  // 奖品列表事件委托（所有动态行）
  const grid=document.getElementById('prize-grid');

  grid.addEventListener('input', function(e){
    const id=+e.target.dataset.id, field=e.target.dataset.field;
    if(!id||!field) return;
    if(field==='name'){ updatePrize(id,'name',e.target.value); calcNameOnly(); }
  });

  grid.addEventListener('change', function(e){
    // 文件上传
    if(e.target.type==='file'){
      handleUpload(+e.target.dataset.uploadId, e.target.files[0]); return;
    }
    const id=+e.target.dataset.id, field=e.target.dataset.field;
    if(!id||!field) return;
    updatePrize(id, field, field==='name'?e.target.value:+e.target.value);
    calc();
  });

  grid.addEventListener('click', function(e){
    // 删除
    const db=e.target.closest('[data-del]');
    if(db){ delPrize(+db.dataset.del); return; }
    // 上传触发
    const ut=e.target.closest('[data-upload-trigger]');
    if(ut){ const fi=ut.closest('.pc-img').querySelector('input[type=file]'); if(fi) fi.click(); return; }
    // 图片灯箱
    const li=e.target.closest('[data-lightbox-id]');
    if(li){ const p=prizes.find(p=>p.id===+li.dataset.lightboxId); if(p&&p.img) openLightbox(p.img,p.name); return; }
  });

  // 推荐结果（apply-all 在生成时绑定，apply 用委托）
  document.getElementById('rec-output').addEventListener('click', function(e){
    const ab=e.target.closest('[data-apply]');
    if(ab){ applySingle(+ab.dataset.apply, +ab.dataset.egg); }
  });

  // 灯箱关闭
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });

  // 初始化
  load();
  calc();
});
</script>
